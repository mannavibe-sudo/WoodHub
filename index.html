<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Prakritik India</title>
<meta name="theme-color" content="#3a2a1e" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" type="image/png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="login-screen" class="login-wrap" style="display:none;">
    <div class="login-card">
      <h1>🪵 Prakritik India</h1>
      <p class="tag">Log book &amp; payment tracker</p>
      <div id="login-error" class="error-banner" style="display:none;"></div>
      <form id="login-form">
        <div class="field" style="margin-bottom:12px; text-align:left;">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" required autocomplete="username" />
        </div>
        <div class="field" style="margin-bottom:16px; text-align:left;">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="login-submit">Log in</button>
      </form>
     </div>
  </div>

  <div id="app-shell" style="display:none;">
    <header class="app-header">
      <div class="brand"><span>🪵</span> Prakritik India<span class="dot">.</span></div>
      <button class="logout" id="logout-btn">Log out</button>
    </header>

    <main>
      <nav class="tabbar" id="tabbar">
        <a href="#dashboard" data-route="dashboard"><span class="icon">📊</span>Dashboard</a>
        <a href="#entry" data-route="entry"><span class="icon">➕</span>New Entry</a>
        <a href="#history" data-route="history"><span class="icon">📋</span>History</a>
        <a href="#assessment" data-route="assessment"><span class="icon">🧾</span>Assessment</a>
      </nav>

      <div id="view"></div>
    </main>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>

  <script src="js/config.js"></script>
  <script src="js/supabase-lite.js"></script>
  <script src="js/fields.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
